<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slot Parking Detroit</title>
    <link rel="stylesheet" href="style.css">
    <!-- Mapbox CSS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet" />
</head>
<body>
   <form id="garageForm">
  <input id="garageId" placeholder="Garage ID" />
  <input id="spotsAvailable" type="number" placeholder="Available spots" />
  <button type="submit">Save</button>
</form>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
  import {
    getFirestore,
    doc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "YOUR_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_ID",
    appId: "YOUR_APP_ID"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  document.getElementById("garageForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const garageId = document.getElementById("garageId").value.trim();
    const spotsAvailable = Number(document.getElementById("spotsAvailable").value);

    await setDoc(doc(db, "garages", garageId), {
      garageId,
      spotsAvailable,
      lastUpdated: serverTimestamp()
    });

    alert("Saved");
  });
</script>
</body>
</html>
